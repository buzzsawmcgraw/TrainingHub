<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personnel — PIP-Boy style (Script Editor)</title>
    <style>
      /* Page shell when viewing this file directly (Script Editor may only embed #sp-pip-ui) */
      body {
        margin: 0;
        padding: 12px;
        background: #000;
      }
      #sp-pip-ui {
        --pip-bg: #050807;
        --pip-bg2: #0a1410;
        --pip-surface: #07120d;
        --pip-green: #3cff7a;
        --pip-green-dim: #1f8f47;
        --pip-green-glow: rgba(60, 255, 122, 0.28);
        --pip-amber: #ffcc66;
        --pip-red: #ff5a45;
        --pip-border: #1e4a36;
        --pip-font: "Consolas", "Monaco", "Lucida Console", "Courier New", monospace;
        box-sizing: border-box;
        padding: 0;
        max-width: 100%;
        font-family: var(--pip-font);
        font-size: 14px;
        line-height: 1.45;
        color: var(--pip-green);
        background: radial-gradient(120% 80% at 50% 0%, #0d1f16 0%, var(--pip-bg) 55%);
        text-shadow: 0 0 2px var(--pip-green-glow);
        border: 2px solid var(--pip-border);
        border-radius: 8px;
        overflow: hidden;
      }
      #sp-pip-ui *,
      #sp-pip-ui *::before,
      #sp-pip-ui *::after {
        box-sizing: border-box;
      }
      #sp-pip-ui .hub-top-banner-wrap {
        width: 100%;
        margin: 0;
        padding: 0;
        line-height: 0;
        overflow: hidden;
        background: #030403;
        border-bottom: 2px solid var(--pip-border);
      }
      #sp-pip-ui .hub-top-banner-wrap[hidden] {
        display: none !important;
      }
      #sp-pip-ui .hub-top-banner-img {
        display: block;
        width: 100%;
        height: auto;
        max-height: min(260px, 30vh);
        object-fit: cover;
        object-position: center center;
      }
      #sp-pip-ui .hub-header {
        padding: 20px 22px 18px;
        background: linear-gradient(180deg, #0d140f 0%, #080c08 55%, var(--pip-bg) 100%);
        border-bottom: 2px solid var(--pip-border);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
      }
      #sp-pip-ui .hub-header-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 18px 24px;
      }
      #sp-pip-ui .hub-logo-wrap {
        flex: 0 0 auto;
        line-height: 0;
        width: 96px;
        height: 96px;
        border: 3px solid var(--pip-green-dim);
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.45);
        box-shadow: 0 0 18px rgba(30, 255, 69, 0.2), inset 0 0 12px rgba(0, 0, 0, 0.5);
        padding: 0;
        overflow: hidden;
      }
      #sp-pip-ui .hub-logo-wrap[hidden] {
        display: none !important;
      }
      #sp-pip-ui .hub-logo {
        display: block;
        width: 100%;
        height: 100%;
        max-width: none;
        max-height: none;
        object-fit: cover;
        object-position: center center;
      }
      #sp-pip-ui .hub-header-titles {
        flex: 1 1 200px;
        min-width: 0;
      }
      #sp-pip-ui .hub-org {
        margin: 0;
        font-size: clamp(1.25rem, 2.8vw, 1.75rem);
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--pip-green);
        line-height: 1.2;
        text-shadow: 0 0 10px var(--pip-green-glow);
      }
      #sp-pip-ui .hub-banner {
        margin: 10px 0 0;
        font-size: clamp(0.68rem, 1.5vw, 0.82rem);
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--pip-red);
        line-height: 1.3;
        text-shadow: 0 0 10px rgba(255, 77, 45, 0.55);
      }
      #sp-pip-ui .hub-main {
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 18px 20px 22px;
      }
      #sp-pip-ui .hub-section {
        margin-bottom: 20px;
      }
      #sp-pip-ui .hub-section:last-child {
        margin-bottom: 0;
      }
      #sp-pip-ui .hub-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        gap: 12px 16px;
        margin-top: 10px;
      }
      #sp-pip-ui .hub-toolbar button {
        flex: 0 0 auto;
        margin: 0;
      }
      #sp-pip-ui .hub-section--roster h2.hub-subtitle {
        margin: 0 0 14px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--pip-border);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--pip-amber);
        text-shadow: 0 0 6px rgba(255, 176, 0, 0.28);
      }
      #sp-pip-ui pre span.ok {
        color: var(--pip-green);
      }
      #sp-pip-ui pre {
        white-space: pre-wrap;
        word-break: break-word;
        background: var(--pip-bg2);
        padding: 12px;
        border: 1px solid var(--pip-border);
        max-height: 70vh;
        overflow: auto;
        color: var(--pip-green);
        font-family: var(--pip-font);
        font-size: 12px;
        line-height: 1.4;
        text-shadow: 0 0 4px var(--pip-green-glow);
      }
      #sp-pip-ui button {
        margin: 8px 8px 8px 0;
        padding: 9px 18px;
        cursor: pointer;
        font-family: var(--pip-font);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #021208;
        background: linear-gradient(180deg, #5dff8f 0%, var(--pip-green) 100%);
        border: 1px solid var(--pip-green-dim);
        border-radius: 4px;
        text-shadow: none;
        box-shadow: 0 0 14px var(--pip-green-glow), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }
      #sp-pip-ui button:hover {
        background: linear-gradient(180deg, #7dffaa 0%, #5dff8f 100%);
        color: #010a06;
      }
      #sp-pip-ui button.btn-secondary {
        background: rgba(8, 24, 14, 0.6);
        color: var(--pip-green);
        border: 1px solid var(--pip-green-dim);
        box-shadow: inset 0 0 12px rgba(60, 255, 122, 0.06);
      }
      #sp-pip-ui button.btn-secondary:hover {
        background: rgba(30, 255, 69, 0.12);
        color: #7dff8f;
      }
      #sp-pip-ui button.btn-danger {
        margin: 0;
        padding: 6px 12px;
        cursor: pointer;
        font-family: var(--pip-font);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #1a0505;
        background: #ff3b35;
        border: 2px solid #9c1818;
        border-radius: 2px;
        text-shadow: none;
        box-shadow: 0 0 10px rgba(255, 60, 50, 0.4);
      }
      #sp-pip-ui button.btn-danger:hover {
        background: #ff6258;
        color: #0a0202;
      }
      #sp-pip-ui table.roster th.roster-actions,
      #sp-pip-ui table.roster td.roster-actions {
        width: 1%;
        white-space: nowrap;
        text-align: center;
        vertical-align: middle;
      }
      #sp-pip-ui button:active {
        transform: translateY(1px);
      }
      #sp-pip-ui .err {
        color: var(--pip-red);
        text-shadow: 0 0 6px rgba(255, 77, 45, 0.55);
      }
      #sp-pip-ui .read-state {
        padding: 12px 14px;
        margin: 0 0 10px;
        border-radius: 6px;
        font-weight: 700;
        letter-spacing: 0.04em;
        border: 1px solid var(--pip-border);
        font-family: var(--pip-font);
      }
      #sp-pip-ui .read-state.loading {
        background: var(--pip-bg2);
        color: var(--pip-green-dim);
        text-shadow: 0 0 4px var(--pip-green-glow);
      }
      #sp-pip-ui .read-state.ok {
        background: #071208;
        color: var(--pip-green);
        border-color: var(--pip-green-dim);
        text-shadow: 0 0 6px var(--pip-green-glow);
      }
      #sp-pip-ui .read-state.warn {
        background: #121005;
        color: var(--pip-amber);
        border-color: #5c4500;
        text-shadow: 0 0 6px rgba(255, 176, 0, 0.35);
      }
      #sp-pip-ui .read-state.err {
        background: #140805;
        color: var(--pip-red);
        border-color: #5c1a0a;
        text-shadow: 0 0 6px rgba(255, 77, 45, 0.45);
      }
      #sp-pip-ui .roster-wrap {
        overflow: auto;
        max-height: min(52vh, 560px);
        border: 1px solid var(--pip-border);
        margin: 0;
        background: rgba(5, 14, 10, 0.55);
        border-radius: 8px;
        box-shadow: inset 0 1px 0 rgba(60, 255, 122, 0.05), inset 0 0 32px rgba(0, 0, 0, 0.5);
      }
      #sp-pip-ui table.roster {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        font-size: 13px;
        font-family: var(--pip-font);
      }
      #sp-pip-ui table.roster th,
      #sp-pip-ui table.roster td {
        text-align: left;
        vertical-align: middle;
      }
      #sp-pip-ui table.roster th {
        position: sticky;
        top: 0;
        z-index: 2;
        padding: 11px 14px;
        font-weight: 600;
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--pip-amber);
        text-shadow: 0 0 8px rgba(255, 204, 102, 0.22);
        background: linear-gradient(180deg, rgba(14, 36, 26, 0.98) 0%, rgba(8, 22, 16, 0.96) 100%);
        border-bottom: 1px solid var(--pip-border);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      }
      #sp-pip-ui table.roster td {
        padding: 10px 14px;
        border-bottom: 1px solid rgba(30, 74, 54, 0.4);
        color: rgba(210, 255, 224, 0.92);
        text-shadow: 0 0 1px rgba(60, 255, 122, 0.12);
      }
      #sp-pip-ui table.roster tbody tr:nth-child(even) td {
        background: rgba(8, 22, 16, 0.38);
      }
      #sp-pip-ui table.roster tbody tr:hover td {
        background: rgba(60, 255, 122, 0.07);
      }
      #sp-pip-ui table.roster thead th:first-child {
        border-top-left-radius: 7px;
      }
      #sp-pip-ui table.roster thead th:last-child {
        border-top-right-radius: 7px;
      }
      #sp-pip-ui details {
        margin-top: 0;
        padding-top: 8px;
        border-top: 1px solid var(--pip-border);
        color: var(--pip-green);
      }
      #sp-pip-ui summary {
        cursor: pointer;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        font-size: 12px;
        color: var(--pip-green);
        text-shadow: 0 0 4px var(--pip-green-glow);
      }
      #sp-pip-ui summary:hover {
        color: #7dff8f;
      }
      #sp-pip-ui .add-person-panel {
        border: 1px solid var(--pip-border);
        border-radius: 8px;
        padding: 18px 20px 20px;
        margin: 0;
        background: linear-gradient(165deg, rgba(12, 28, 18, 0.95) 0%, var(--pip-surface) 45%, var(--pip-bg2) 100%);
        box-shadow: inset 0 1px 0 rgba(60, 255, 122, 0.06), inset 0 0 28px rgba(0, 0, 0, 0.45);
      }
      #sp-pip-ui .add-person-panel h2.hub-subtitle {
        margin: 0 0 14px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--pip-border);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--pip-amber);
        text-shadow: 0 0 6px rgba(255, 176, 0, 0.28);
      }
      #sp-pip-ui form#newPersonForm.add-form-stack {
        display: flex;
        flex-direction: column;
        gap: 0;
        min-width: 0;
      }
      #sp-pip-ui .add-form-split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        align-items: stretch;
        margin-bottom: 14px;
      }
      #sp-pip-ui .add-form-split--primary {
        padding: 6px 8px 8px;
        margin-bottom: 16px;
        gap: 16px;
        background: linear-gradient(165deg, rgba(10, 28, 18, 0.75) 0%, rgba(5, 14, 10, 0.85) 100%);
        border: 1px solid var(--pip-border);
        border-radius: 8px;
        box-shadow: inset 0 1px 0 rgba(60, 255, 122, 0.07), 0 6px 22px rgba(0, 0, 0, 0.38);
      }
      #sp-pip-ui .add-form-split--primary > fieldset.add-form-group {
        background: rgba(3, 12, 8, 0.82);
        box-shadow: inset 0 0 0 1px rgba(60, 255, 122, 0.05);
      }
      @media (max-width: 768px) {
        #sp-pip-ui .add-form-split {
          grid-template-columns: 1fr;
        }
      }
      #sp-pip-ui .add-form-split > fieldset.add-form-group {
        margin-bottom: 0;
        min-height: 100%;
      }
      #sp-pip-ui fieldset.add-form-group {
        border: 1px solid var(--pip-border);
        border-radius: 6px;
        padding: 8px 14px 14px;
        margin: 0 0 14px;
        min-width: 0;
        background: rgba(4, 14, 10, 0.55);
        box-shadow: inset 0 0 0 1px rgba(60, 255, 122, 0.04);
      }
      #sp-pip-ui form#newPersonForm.add-form-stack > fieldset.add-form-group:last-of-type {
        margin-bottom: 0;
      }
      #sp-pip-ui fieldset.add-form-group--compact {
        max-width: min(100%, 28rem);
      }
      #sp-pip-ui .add-form-group-legend {
        padding: 0 6px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--pip-amber);
        text-shadow: 0 0 6px rgba(255, 176, 0, 0.28);
      }
      #sp-pip-ui .add-form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(min(100%, 176px), 1fr));
        gap: 12px 14px;
        align-items: start;
      }
      #sp-pip-ui .add-form-grid--stack {
        grid-template-columns: 1fr;
      }
      #sp-pip-ui .add-form-grid--inline-quad {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px 12px;
        align-items: end;
      }
      @media (max-width: 900px) {
        #sp-pip-ui .add-form-grid--inline-quad {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      #sp-pip-ui .add-form-grid--inline-quad .add-field--notes textarea {
        min-height: 40px;
        max-height: 76px;
      }
      #sp-pip-ui fieldset.add-form-group--inline-row {
        margin-bottom: 14px;
      }
      #sp-pip-ui .add-field--address textarea {
        min-height: 48px;
        max-height: 88px;
        resize: vertical;
      }
      #sp-pip-ui .add-field--notes textarea {
        min-height: 52px;
        max-height: 100px;
        resize: vertical;
      }
      #sp-pip-ui .add-field label {
        display: block;
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 4px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--pip-green-dim);
      }
      #sp-pip-ui .add-field input,
      #sp-pip-ui .add-field select,
      #sp-pip-ui .add-field textarea {
        width: 100%;
        box-sizing: border-box;
        font: 13px var(--pip-font);
        padding: 8px 10px;
        border: 1px solid var(--pip-green-dim);
        border-radius: 4px;
        background: rgba(3, 10, 6, 0.85);
        color: var(--pip-green);
        text-shadow: 0 0 2px var(--pip-green-glow);
      }
      #sp-pip-ui .add-field textarea {
        min-height: 52px;
        resize: vertical;
        line-height: 1.4;
      }
      #sp-pip-ui .add-field input::placeholder,
      #sp-pip-ui .add-field textarea::placeholder {
        color: #1a5c28;
      }
      #sp-pip-ui .add-field input:focus,
      #sp-pip-ui .add-field select:focus,
      #sp-pip-ui .add-field textarea:focus {
        outline: none;
        border-color: var(--pip-green);
        box-shadow: 0 0 10px var(--pip-green-glow);
      }
      #sp-pip-ui .add-field select option {
        background: #050805;
        color: var(--pip-green);
      }
      #sp-pip-ui .add-form-actions {
        margin-top: 18px;
        padding-top: 16px;
        border-top: 1px solid var(--pip-border);
        display: flex;
        gap: 10px 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      #sp-pip-ui .add-form-actions button {
        margin: 0;
      }
      #sp-pip-ui .mono {
        font-family: var(--pip-font);
        font-size: 12px;
        color: var(--pip-amber);
        text-shadow: 0 0 4px rgba(255, 176, 0, 0.25);
      }
    </style>
  </head>
  <body>
    <!-- Paste everything inside <body> … </body>, or only the #sp-pip-ui block, into Modern Script Editor. -->
    <div id="sp-pip-ui">
      <div class="hub-top-banner-wrap" id="hubTopBannerWrap" hidden>
        <img id="hubTopBannerImg" class="hub-top-banner-img" src="" alt="" decoding="async" />
      </div>
      <header class="hub-header">
        <div class="hub-header-row">
          <div class="hub-logo-wrap" id="hubLogoWrap" hidden>
            <img id="hubLogoImg" class="hub-logo" src="" alt="" decoding="async" />
          </div>
          <div class="hub-header-titles">
            <h1 class="hub-org">88th Security Forces Squadron</h1>
            <p class="hub-banner">Authorized Personnel Only</p>
          </div>
        </div>
      </header>
      <main class="hub-main">
        <section class="hub-section hub-section--form" aria-label="Training Hub entry">
          <div id="addPersonPanel" class="add-person-panel" aria-live="polite"></div>
        </section>
        <section class="hub-section hub-section--status" aria-label="Connection status and refresh">
          <div id="rosterReadState" class="read-state loading">Loading list…</div>
          <div class="hub-toolbar">
            <button type="button" id="probeRun">Refresh list</button>
          </div>
        </section>
        <section class="hub-section hub-section--roster" aria-label="Personnel roster">
          <h2 class="hub-subtitle">Personnel roster</h2>
          <div class="roster-wrap">
            <table class="roster" aria-label="Personnel rows from SharePoint">
              <thead id="rosterThead"></thead>
              <tbody id="rosterTableBody"></tbody>
            </table>
          </div>
        </section>
        <section class="hub-section hub-section--diag">
          <details>
            <summary>Diagnostics (REST details &amp; raw JSON)</summary>
            <pre id="probeOut"></pre>
          </details>
        </section>
      </main>
    </div>

    <script>
      (function () {
        // ============ EDIT THESE (URLs remove ambiguity) ============
        /**
         * 88thSFS deployment reference:
         * - Site page: https://usaf.dps.mil/sites/88thSFS/SitePages/S3T.aspx
         * - List view: https://usaf.dps.mil/sites/88thSFS/Lists/Personnel.AllItems.aspx
         *
         * (A) Site root — no trailing slash. REST is always: SITE_ROOT + "/_api/web/..."
         */
        const PERSONNEL_SITE_ROOT_URL = "https://usaf.dps.mil/sites/88thSFS";

        /**
         * (B) Optional fallback: paste any URL under the site; derives …/sites/88thSFS. Ignored when (A) is set.
         * Example: https://usaf.dps.mil/sites/88thSFS/Lists/Personnel.AllItems.aspx
         */
        const PERSONNEL_SHAREPOINT_URL = "";

        /** @deprecated Same effect as PERSONNEL_SITE_ROOT_URL; kept for older copies of this file. */
        const PERSONNEL_REST_WEB_URL = "";

        /** Must match Site contents list title (URL …/Lists/Personnel… usually means title "Personnel"). */
        const LIST_PERSONNEL = "Personnel";
        /** Optional: List GUID from List settings → use if getbytitle fails. */
        const LIST_PERSONNEL_GUID = "";

        /**
         * Circular profile image to the left of the squadron header (default: **S3T Files** / **Fallout Guy.png**).
         * `HUB_PROFILE_IMAGE_URL` — full URL override. `HUB_LOGO_URL` — legacy override if profile URL is empty.
         * Otherwise built from `PERSONNEL_SITE_ROOT_URL` + `HUB_PROFILE_SITE_RELATIVE_PATH`.
         */
        const HUB_PROFILE_IMAGE_URL = "";
        /** Path from site root (spaces as %20). Same folder convention as the banner. */
        const HUB_PROFILE_SITE_RELATIVE_PATH = "S3T%20Files/Fallout%20Guy.png";
        const HUB_PROFILE_ALT = "Fallout guy";

        /**
         * Optional square/rect masthead image (legacy). If set and `HUB_PROFILE_IMAGE_URL` is empty, used as profile
         * source before the Fallout Guy default path.
         */
        const HUB_LOGO_URL = "";
        /** Alt text fallback when the profile image is shown. */
        const HUB_LOGO_ALT = "88th Security Forces Squadron";

        /**
         * Full-width image across the top of the web part (default: **S3T Files** / **banner.png** on this site).
         * Paste a full file URL here to override. Leave "" to build from `PERSONNEL_SITE_ROOT_URL` +
         * `HUB_BANNER_SITE_RELATIVE_PATH`. If the image does not load, open the file in SharePoint, copy the browser
         * address, and set `HUB_TOP_BANNER_URL` to that value (or fix `HUB_BANNER_SITE_RELATIVE_PATH` — e.g. add
         * `Shared%20Documents/` if **S3T Files** is a folder inside Documents, not the library root).
         */
        const HUB_TOP_BANNER_URL = "";
        /** Path from site root to `banner.png` (spaces as %20). */
        const HUB_BANNER_SITE_RELATIVE_PATH = "S3T%20Files/banner.png";
        const HUB_TOP_BANNER_ALT = "88th Security Forces Squadron banner";

        /**
         * Roster column `key` values that render as dropdowns. Options are loaded from SharePoint field **Choices**
         * (same internal name as used for save — see `resolveWriteKey` / first data row).
         */
        const DROPDOWN_COLUMN_KEYS = ["Status", "OfficeSymbol", "Squadron", "Rank"];

        /** Send SharePoint **Title** on create (built from Last + First, else DoD ID, else "New personnel"). */
        const SET_TITLE_ON_CREATE = true;

        /**
         * Roster columns — fixed order for 88thSFS Personnel. Remove the `Id` row if you do not want Personnel ID.
         * If a column is always blank, open Diagnostics and change that row’s `key` / add `altKeys` (see Record Date).
         */
        const ROSTER_COLUMNS = [
          { key: "Id", label: "Personnel ID" },
          {
            key: "RecordDate",
            label: "Record Date",

        function normalizedRosterColumns() {
          const arr = Array.isArray(ROSTER_COLUMNS) ? ROSTER_COLUMNS : [];
          const result = [];
          arr.forEach((entry) => {
            if (entry == null) return;
            if (typeof entry === "string") {
              const key = entry.trim();
              if (key) result.push({ key: key, label: key, tryKeys: [key], saveKey: null });
              return;
            }
            if (typeof entry === "object") {
              const key = String(entry.key != null ? entry.key : entry.field != null ? entry.field : "").trim();
              if (!key) return;
              const label = String(entry.label != null ? entry.label : "").trim() || key;
              const alt = Array.isArray(entry.altKeys)
                ? entry.altKeys.map((x) => String(x).trim()).filter(Boolean)
                : [];
              const tryKeys = [key];
              alt.forEach((a) => {
                if (a && tryKeys.indexOf(a) === -1) tryKeys.push(a);
              });
              const saveKey = entry.saveKey != null ? String(entry.saveKey).trim() : "";
              result.push({ key: key, label: label, tryKeys: tryKeys, saveKey: saveKey || null });
            }
          });
          return result;
        }

        /** Explicit plan from ROSTER_COLUMNS, or auto from row keys. */
        function resolveRosterColumnPlan(rows) {
          const explicit = normalizedRosterColumns();
          if (explicit.length > 0) return { mode: "explicit", columns: explicit };
          const keys = collectColumnKeys(rows);
          return { mode: "auto", columns: keys.map((k) => ({ key: k, label: k, tryKeys: [k], saveKey: null })) };
        }

        /** Skip OData / navigation noise; every other property becomes a table column. */
        function isODataOrMetaKey(k) {
          if (!k || typeof k !== "string") return true;
          if (k.indexOf("@") === 0) return true;
          if (k.indexOf("odata.") === 0) return true;
          return k === "odata.type" || k === "odata.id" || k === "odata.editLink" || k === "odata.metadata";
        }

        /** Union of field names across all loaded rows (order: Id, Title, then A–Z). */
        function collectColumnKeys(rows) {
          const set = new Set();
          rows.forEach((item) => {
            if (!item || typeof item !== "object") return;
            Object.keys(item).forEach((k) => {
              if (!isODataOrMetaKey(k)) set.add(k);
            });
          });
          const keys = Array.from(set);
          const priority = ["Id", "Title"];
          keys.sort((a, b) => {
            const ia = priority.indexOf(a);
            const ib = priority.indexOf(b);
            if (ia !== -1 || ib !== -1) {
              if (ia === -1) return 1;
              if (ib === -1) return -1;
              return ia - ib;
            }
            return a.localeCompare(b, undefined, { sensitivity: "base" });
          });
          return keys;
        }

        function formatCellValue(val) {
          if (val === null || val === undefined) return "";
          if (typeof val === "boolean") return val ? "Yes" : "No";
          if (typeof val === "number") return String(val);
          if (typeof val === "string") {
            const m = val.match(/^\/Date\((\d+)\)\/$/);
            if (m) {
              const d = new Date(parseInt(m[1], 10));
              if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
            }
            const isoDay = val.match(/^(\d{4}-\d{2}-\d{2})(?:T|$)/);
            if (isoDay) return isoDay[1];
            return val;
          }
          try {
            return JSON.stringify(val);
          } catch (_) {
            return String(val);
          }
        }

        function valueFromItemByKeys(item, tryKeys) {
          if (!item || !tryKeys || !tryKeys.length) return undefined;
          for (let i = 0; i < tryKeys.length; i++) {
            const k = tryKeys[i];
            if (!k || !Object.prototype.hasOwnProperty.call(item, k)) continue;
            const v = item[k];
            if (v !== null && v !== undefined && v !== "") return v;
          }
          for (let i = 0; i < tryKeys.length; i++) {
            const k = tryKeys[i];
            if (k && Object.prototype.hasOwnProperty.call(item, k)) return item[k];
          }
          return undefined;
        }

        function resolveWriteKey(col, sampleRow) {
          if (col.saveKey) return String(col.saveKey).trim();
          if (sampleRow) {
            const tryKeys = col.tryKeys || [col.key];
            const hit = tryKeys.find((k) => sampleRow && Object.prototype.hasOwnProperty.call(sampleRow, k));
            if (hit) return hit;
          }
          return col.key;
        }

        function deriveSiteRootFromSharePointUrl(raw) {
          const s = String(raw || "").trim();
          if (!s) return "";
          try {
            const u = new URL(s);
            const path = u.pathname || "";
            const sites = path.match(/^(\/sites\/[^/]+)/i);
            if (sites) return (u.origin + sites[1]).replace(/\/$/, "");
            const teams = path.match(/^(\/teams\/[^/]+)/i);
            if (teams) return (u.origin + teams[1]).replace(/\/$/, "");
            return u.origin.replace(/\/$/, "");
          } catch (_) {
            return "";
          }
        }

          if (legacy) return legacy;
          const derived = deriveSiteRootFromSharePointUrl(PERSONNEL_SHAREPOINT_URL);
          if (derived) return derived;
          const ctx = getCtx();
          if (ctx && ctx.webAbsoluteUrl) return String(ctx.webAbsoluteUrl).replace(/\/$/, "");

        /**
         * Fresh X-RequestDigest for a given web URL. Required when POST/MERGE targets a web different from the
         * Script Editor page, or when the hidden __REQUESTDIGEST is stale ("security validation ... invalid").
         */
        async function fetchFormDigestForWeb(webAbsoluteUrl) {
          const base = String(webAbsoluteUrl || "").trim().replace(/\/$/, "");
          if (!base) return "";
          const res = await fetch(base + "/_api/contextinfo", {
            method: "POST",
            headers: {
              Accept: "application/json;odata=nometadata",
              "Content-Type": "application/json;odata=nometadata",
            },
            credentials: "include",
            cache: "no-store",
          });
          const text = await res.text();
          let data = null;
          try {
            data = text ? JSON.parse(text) : null;
          } catch (_) {}
          if (!res.ok || !data) return "";
          if (data.FormDigestValue) return String(data.FormDigestValue);
          if (data.d && data.d.GetContextWebInformation && data.d.GetContextWebInformation.FormDigestValue) {
            return String(data.d.GetContextWebInformation.FormDigestValue);
          }
          return "";
        }

        async function spFetch(path, opts, baseUrlOverride) {
          opts = opts || {};
          const base =
            baseUrlOverride != null && String(baseUrlOverride).trim()
              ? String(baseUrlOverride).trim().replace(/\/$/, "")
              : resolvedPersonnelRestBase();
          const headers = Object.assign({}, opts.headers || {});
          headers["Accept"] = "application/json;odata=nometadata";
          const method = (opts.method || "GET").toUpperCase();
          if (method !== "GET" && method !== "DELETE") {
            headers["Content-Type"] = "application/json;odata=nometadata";
          }

          const isPostWithBody = method === "POST" && opts.body != null;
          const needsWriteDigest =
            !opts.skipAntiForgery && (method === "MERGE" || method === "DELETE" || isPostWithBody);

          let digest = "";
          if (needsWriteDigest) {
            try {
              digest = await fetchFormDigestForWeb(base);
            } catch (_) {
              digest = "";
            }
            if (!digest) digest = getDigest();
          } else {
            digest = getDigest();
          }
          if (digest) headers["X-RequestDigest"] = digest;

          let realMethod = method;
          if (method === "MERGE" || method === "DELETE") {
            headers["X-HTTP-Method"] = method;
            headers["IF-MATCH"] = "*";
            realMethod = "POST";
          }
          const res = await fetch(base + path, {
            method: realMethod,
            headers,
            body: opts.body ? JSON.stringify(opts.body) : undefined,
            credentials: "include",
            cache: "no-store",
          });
          if (res.status === 204) return null;
          const text = await res.text();
          let data = null;
          try {
            data = text ? JSON.parse(text) : null;
          } catch (_) {}
          if (!res.ok) {
            let msg = "";
            if (data && data.error) {
              msg =
                (typeof data.error.message === "string" && data.error.message) ||
                (data.error.message && data.error.message.value) ||
                "";
            }
            if (!msg && data && data["odata.error"] && data["odata.error"].message) {
              msg = data["odata.error"].message.value || data["odata.error"].message || "";
            }
            if (!msg) msg = text || "";
            throw new Error((res.status + " " + res.statusText + " " + msg).slice(0, 1200));
          }
          return data;
        }

                splitWrap = document.createElement("div");
                splitWrap.className = "add-form-split add-form-split--primary";
                splitWrap.appendChild(fs);
                form.appendChild(splitWrap);
                return;
              }
              if (group.split === "right") {
                if (!splitWrap) {
                  splitWrap = document.createElement("div");
                  splitWrap.className = "add-form-split";
                  form.appendChild(splitWrap);
                }
                splitWrap.appendChild(fs);
                return;
              }
              form.appendChild(fs);
            });
          }

          const leftovers = cols.filter((c) => c.key !== "Id" && !groupedKeys.has(c.key));
          if (leftovers.length) {
            const grid = document.createElement("div");
            grid.className = "add-form-grid";
            leftovers.forEach((col) => {
              const fwrap = buildAddFieldWrap(col, sampleRow);
              if (fwrap) grid.appendChild(fwrap);
            });
            if (grid.childElementCount) {
              const fs = document.createElement("fieldset");
              fs.className = "add-form-group";
              const leg = document.createElement("legend");
              leg.className = "add-form-group-legend";
              leg.textContent = "Additional fields";
              fs.appendChild(leg);
              fs.appendChild(grid);
              form.appendChild(fs);
            }
          }

          const bar = document.createElement("div");
          bar.className = "add-form-actions";
          const submitBtn = document.createElement("button");
          submitBtn.type = "submit";
          submitBtn.className = "btn";
          submitBtn.textContent = "Save to Personnel";
          bar.appendChild(submitBtn);
          const clearBtn = document.createElement("button");
          clearBtn.type = "button";
          clearBtn.className = "btn-secondary";
          clearBtn.textContent = "Clear form";
          clearBtn.addEventListener("click", () => {
            form.reset();
            primeRecordDateDefault();
          });
          bar.appendChild(clearBtn);
          form.appendChild(bar);
          panel.appendChild(form);

          for (let i = 0; i < cols.length; i++) {
            const col = cols[i];
            if (col.key === "Id") continue;
            if (DROPDOWN_COLUMN_KEYS.indexOf(col.key) === -1) continue;
            const writeKey = resolveWriteKey(col, sampleRow);
            const sel = document.getElementById("nf_" + col.key);
            if (!sel || sel.tagName !== "SELECT") continue;
            try {
              const r = await fetchChoiceOptions(seg, pw, writeKey);
              if (r.choices && r.choices.length) {
                r.choices.forEach((c) => {
                  const o = document.createElement("option");
                  o.value = c;
                  o.textContent = c;
                  sel.appendChild(o);
                });
              } else {
                const o = document.createElement("option");
                o.value = "";
                o.textContent = "(no choices — check field internal name: " + writeKey + ")";
                o.disabled = true;
                sel.appendChild(o);
              }
            } catch (e) {
              log("Choices for " + writeKey + ": " + (e.message || String(e)), "err");
              const o = document.createElement("option");
              o.value = "";
              o.textContent = "(error loading choices)";
              o.disabled = true;
              sel.appendChild(o);
            }
          }
          primeRecordDateDefault();
        }

        async function submitNewPerson(meta, pw, seg, sampleRow) {
          /** With `application/json;odata=nometadata`, do not send `__metadata` — SharePoint treats it as a list column and returns 400. */
          const cols = normalizedRosterColumns();
          let lastName = "";
          let firstName = "";
          let dod = "";
          cols.forEach((col) => {
            if (col.key === "Id") return;
            const el = document.getElementById("nf_" + col.key);
            if (!el) return;
            const v = String(el.value || "").trim();
            if (col.key === "LastName") lastName = v;
            if (col.key === "FirstName") firstName = v;
            if (col.key === "DoDID") dod = v;
          });
          if (!lastName || !firstName) {
            setReadState("err", "Last name and First name are required before saving.");
            return;
          }

          const payload = {};
          cols.forEach((col) => {
            if (col.key === "Id") return;
            const el = document.getElementById("nf_" + col.key);
            if (!el) return;
            const writeKey = el.dataset.writeKey || resolveWriteKey(col, sampleRow);
            let v = String(el.value || "").trim();
            if (v === "") return;
            if (el.type === "date") {
              payload[writeKey] = v + "T00:00:00Z";
              return;
            }
            payload[writeKey] = v;
          });

          if (SET_TITLE_ON_CREATE) {
            const title = [lastName, firstName].filter(Boolean).join(", ") || dod || "New personnel";
            payload.Title = title;
          }

          try {
            setReadState("loading", "Saving new person…");
            const created = await spFetch(`/_api/web/${seg}/items`, { method: "POST", body: payload }, pw);
            const newId = parseCreatedItemId(created);
            log("POST created item Id: " + (newId || "?"), "ok");
            const form = document.getElementById("newPersonForm");
            if (form) form.reset();
            primeRecordDateDefault();
            await runProbe();
            setReadState("ok", newId ? "Saved new person (Id " + newId + "). Table refreshed." : "Saved. Table refreshed.");
          } catch (e) {
            setReadState("err", "Save failed: " + (e.message || String(e)).slice(0, 420));
            log("POST failed:\n" + (e.message || String(e)), "err");
          }
        }

        async function runProbe() {
          out.innerHTML = "";
          clearRosterTable();
          const addPanel = document.getElementById("addPersonPanel");
          if (addPanel) addPanel.innerHTML = "";
          setReadState("loading", "Loading Personnel list from SharePoint…");

          const ctx = getCtx();
          const pageWeb = ctx && ctx.webAbsoluteUrl ? String(ctx.webAbsoluteUrl).replace(/\/$/, "") : "";
          const pw = resolvedPersonnelRestBase();
          if (!pw) {
            setReadState(
              "err",
              "No REST base URL. Set PERSONNEL_SITE_ROOT_URL (or PERSONNEL_SHAREPOINT_URL), or open this on a SharePoint page.",
            );
            log(
              "FAIL: No REST base URL. Set PERSONNEL_SITE_ROOT_URL to your site root, or set PERSONNEL_SHAREPOINT_URL to any page/list URL under that site, then reload.",
              "err",
            );
            return;
          }
          const seg = personnelListApiPath();

          const baseSource = String(PERSONNEL_SITE_ROOT_URL || "").trim()
            ? "PERSONNEL_SITE_ROOT_URL"
            : String(PERSONNEL_REST_WEB_URL || "").trim()
              ? "PERSONNEL_REST_WEB_URL"
              : String(PERSONNEL_SHAREPOINT_URL || "").trim()
                ? "PERSONNEL_SHAREPOINT_URL (derived site root)"
                : pageWeb
                  ? "_spPageContextInfo.webAbsoluteUrl (page)"
                  : "unknown";
          log("How REST base was chosen: " + baseSource);
          log("location.href:\n" + String(location.href));
          log("Page web from context (informational only):\n" + (pageWeb || "(no _spPageContextInfo — OK if explicit URLs are set)"));
          log(
            "REST base used for ALL API calls below:\n" +
              pw +
              (pageWeb && pw === pageWeb
                ? "  (same as page — from context or your URL matched the page site)"
                : "  (explicit URL / derived from PERSONNEL_SHAREPOINT_URL — not necessarily this page’s site)"),
          );
          log("List API segment:\n/_api/web/" + seg);
          log("LIST_PERSONNEL (trimmed):\n" + JSON.stringify(personnelListTitle()));

          let meta = null;
          try {
            log("--- Request: GET list metadata ---", "ok");
            meta = await spFetch(`/_api/web/${seg}?$select=Id,Title,ItemCount,ListItemEntityTypeFullName`, {}, pw);
            log(meta);
          } catch (e) {
            log("LIST METADATA FAILED:\n" + (e.message || String(e)), "err");
            setReadState("err", "Cannot read this list (metadata request failed). Open Diagnostics for details and list names.");
            try {
              await enumerateListTitles(pw);
            } catch (e2) {
              log("Could not enumerate lists either:\n" + (e2.message || String(e2)), "err");
            }
            return;
          }

          const seg2 = personnelListApiPath();
          let items = null;
          try {
            log("--- Request: GET items (up to 500, orderby Modified) ---", "ok");
            items = await spFetch(`/_api/web/${seg2}/items?$top=500&$orderby=Modified desc`, {}, pw);
          } catch (e0) {
            if (/\b400\b/.test(String(e0.message || ""))) {
              log("orderby failed with 400; retry without orderby…", "err");
              try {
                items = await spFetch(`/_api/web/${seg2}/items?$top=500`, {}, pw);
              } catch (e1) {
                setReadState("err", "Cannot read list items: " + (e1.message || String(e1)).slice(0, 280));
                log("ITEMS FAILED (after retry):\n" + (e1.message || String(e1)), "err");
                return;
              }
            } else {
              setReadState("err", "Cannot read list items: " + (e0.message || String(e0)).slice(0, 280));
              log("ITEMS FAILED:\n" + (e0.message || String(e0)), "err");
              return;
            }
          }

          const rows = (items && items.value) || [];
          log("Row count returned: " + rows.length, rows.length ? "ok" : "err");
          const sampleRow = rows.length > 0 ? rows[0] : null;
          const plan = resolveRosterColumnPlan(rows);

          if (rows.length === 0) {
            setReadState(
              "warn",
              "REST succeeded but returned 0 rows in the default view (SharePoint ItemCount=" +
                (meta && meta.ItemCount != null ? meta.ItemCount : "?") +
                "). You can still add a person below; refresh after the first item exists.",
            );
            log("List is empty (ItemCount may still be > 0 if filtered view — this is default view items).");
          } else {
            if (plan.mode === "explicit") {
              log(
                "Roster mode: **explicit** ROSTER_COLUMNS (" +
                  plan.columns.length +
                  "):\n" +
                  plan.columns.map((c) => c.key + (c.label !== c.key ? "  (header: " + c.label + ")" : "")).join("\n"),
                "ok",
              );
            } else {
              const tableKeys = collectColumnKeys(rows);
              log(
                "Roster mode: **auto** (union of fields on loaded rows). Copy names into ROSTER_COLUMNS to fix layout:\n" +
                  tableKeys.join(", "),
                "ok",
              );
            }
            log("--- First row (raw JSON) ---", "ok");
            log(rows[0]);
            if (rows.length > 1) {
              log("--- Second row (raw JSON) ---", "ok");
              log(rows[1]);
            }
            log(
              plan.mode === "explicit"
                ? "DONE. Table uses your ROSTER_COLUMNS order; wrong cells mean a `key` does not match REST (check spelling)."
                : "DONE. Set ROSTER_COLUMNS in the script to control column order and labels; auto mode uses every field returned.",
              "ok",
            );
          }

          await renderAddPersonForm(meta, pw, seg2, sampleRow);
          renderRosterTable(rows, meta, pw, seg2);
        }

        btn.addEventListener("click", () => {
          runProbe().catch((e) => {
            setReadState("err", "Unexpected error: " + (e.message || String(e)).slice(0, 280));
            log("UNCAUGHT:\n" + (e.message || String(e)), "err");
          });
        });

        runProbe().catch((e) => {
          setReadState("err", "Unexpected error: " + (e.message || String(e)).slice(0, 280));
          log("UNCAUGHT:\n" + (e.message || String(e)), "err");
        });
      })();
    </script>
  </body>
</html>

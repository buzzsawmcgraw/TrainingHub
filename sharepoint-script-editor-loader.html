<!-- Upload training-hub-embed.html to Site Assets first. -->
<div id="training-hub-mount" style="font-family:Consolas,monospace;color:#3cff7a;padding:12px;">Loading Training Hub…</div>
<script>
(function () {
  var mount = document.getElementById("training-hub-mount");
  if (!mount) return;
  var assetUrl = "/sites/88thSFS/SiteAssets/training-hub-embed.html";

  function runScriptNode(node, done) {
    var s = document.createElement("script");
    if (node.src) {
      s.src = node.src;
      s.onload = function () { done(); };
      s.onerror = function () { done(new Error("Could not load " + node.src)); };
    } else {
      s.text = node.textContent || node.innerText || "";
    }
    document.body.appendChild(s);
    if (!node.src) done();
  }

  function runScriptsInOrder(nodes, index, cb) {
    if (index >= nodes.length) {
      cb();
      return;
    }
    runScriptNode(nodes[index], function (err) {
      if (err) {
        cb(err);
        return;
      }
      runScriptsInOrder(nodes, index + 1, cb);
    });
  }

  fetch(assetUrl, { credentials: "same-origin", cache: "no-cache" })
    .then(function (res) {
      if (!res.ok) throw new Error("Upload training-hub-embed.html to Site Assets at " + assetUrl);
      return res.text();
    })
    .then(function (markup) {
      var parent = mount.parentNode;
      var parsed = new DOMParser().parseFromString(markup, "text/html");
      var scriptNodes = [];
      Array.prototype.slice.call(parsed.body.childNodes).forEach(function (node) {
        if (node.nodeType !== 1) return;
        if (node.tagName === "SCRIPT") {
          scriptNodes.push(node);
          return;
        }
        parent.insertBefore(node.cloneNode(true), mount);
      });
      return new Promise(function (resolve, reject) {
        runScriptsInOrder(scriptNodes, 0, function (err) {
          if (err) reject(err);
          else resolve(parent);
        });
      });
    })
    .then(function (parent) {
      if (parent && mount.parentNode === parent) parent.removeChild(mount);
    })
    .catch(function (err) {
      mount.textContent = "Training Hub failed to load: " + (err.message || String(err));
    });
})();
</script>

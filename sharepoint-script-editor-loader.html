<!-- Upload training-hub-embed.html to Site Assets first. -->
<div id="training-hub-mount" style="font-family:Consolas,monospace;color:#3cff7a;padding:12px;">Loading Training Hub…</div>
<script>
(function () {
  var mount = document.getElementById("training-hub-mount");
  if (!mount) return;
  var assetUrl = "/sites/88thSFS/SiteAssets/training-hub-embed.html";
  fetch(assetUrl, { credentials: "same-origin", cache: "no-cache" })
    .then(function (res) {
      if (!res.ok) throw new Error("Upload training-hub-embed.html to Site Assets at " + assetUrl);
      return res.text();
    })
    .then(function (markup) {
      var parent = mount.parentNode;
      var temp = document.createElement("div");
      temp.innerHTML = markup;
      while (temp.firstChild) {
        var node = temp.firstChild;
        if (node.tagName === "SCRIPT") {
          temp.removeChild(node);
          var s = document.createElement("script");
          if (node.src) s.src = node.src;
          else s.text = node.textContent;
          parent.insertBefore(s, mount);
        } else {
          parent.insertBefore(node, mount);
        }
      }
      parent.removeChild(mount);
    })
    .catch(function (err) {
      mount.textContent = "Training Hub failed to load: " + (err.message || String(err));
    });
})();
</script>
